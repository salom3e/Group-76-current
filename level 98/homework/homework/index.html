<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="card">
            <img src="../homework/images/image-equilibrium.jpg" alt="image cube" id="cube-img">

            <div class="text">
                <div class="text1">
                    <p class="p1">Equilibrium #3429</p>
                    <p class="p2">Our Equilibrium collection promotes balance and calm.</p>
                </div>

                <div class="text2">
                    <div class="icon1">
                        <img src="../homework/images/icon-ethereum.svg" alt="icon crystal">
                        <p class="p3">0.041 ETH</p>
                    </div>

                    <div class="icon2">
                        <img src="../homework/images/icon-clock.svg" alt="icon clock">
                        <p class="p4">3 days left</p>
                    </div>
                </div>
            </div>

            <div class="line"></div>

            <div class="text3">
                <img src="../homework/images/image-avatar.png" alt="image avatar">

                <p class="p5">Creation of <b>Jules Wyvern</b></p>
            </div>
        </div>
    </main>
</body>

</html>
