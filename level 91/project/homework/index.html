<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="parent">
            <div class="div1">
                <p class="p1">Your Result</p>
                <div class="circle">
                    <p class="p2">76</p>
                    <p class="p3">of 100</p>
                </div>

                <div class="text">
                    <p class="p4">Great</p>
                </div>

                <div class="text2">
                    <p class="p">You scored higher than 65% of</p>
                    <p class="p">the people who have taken</p>
                    <p class="p">these tests.</p>
                </div>

            </div>

            <div class="div2">
                <p class="p8">Summary</p>

                <div class="colors">
                    <div class="color1">
                        <img src="icon-reaction.svg" alt="elva">

                        <div class="box1">
                            <p class="p9">Reaction</p>

                            <div class="light">
                                <p class="pnum">80</p>
                                <p class="p100">/ 100</p>
                            </div>
                        </div>
                    </div>

                    <div class="color2">
                        <img src="icon-memory.svg" alt="tvini">

                        <div class="box2">
                            <p class="p11">Memory</p>

                            <div class="light2">
                                <p class="pnum">92</p>
                                <p class="p100">/ 100</p>
                            </div>
                        </div>
                    </div>

                    <div class="color3">
                        <img src="icon-verbal.svg" alt="mesiji">

                        <div class="box3">
                            <p class="p13">Verbal</p>

                            <div class="light3">
                                <p class="pnum">61</p>
                                <p class="p100">/ 100</p>
                            </div>
                        </div>
                    </div>

                    <div class="color4">
                        <img src="icon-visual.svg" alt="tvali">

                        <div class="box4">
                            <p class="p15">Visual</p>

                            <div class="light4">
                                <p class="pnum">73</p>
                                <p class="p100">/ 100</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="button">
                    <button>Continue</button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
